name: Keep Supabase Alive

on:
  schedule:
    - cron: '0 0 * * 2,5'
  workflow_dispatch:

jobs:
  ping-supabase:
    runs-on: ubuntu-latest
    steps:
      - name: Send API request to Supabase Auth Health
        run: |
          curl -i -X GET "${{ secrets.SUPABASE_PROJECT_URL }}/auth/v1/health" \
          -H "apikey: ${{ secrets.SUPABASE_ANON_KEY }}"