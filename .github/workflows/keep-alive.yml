name: Keep Supabase Alive

on:
  schedule:
    - cron: '0 0 * * 2,5'
  workflow_dispatch:

jobs:
  ping-supabase:
    runs-on: ubuntu-latest
    steps:
      - name: Send API request to Supabase
        run: |
          curl -i -X GET "${{ secrets.SUPABASE_PROJECT_URL }}/rest/v1/" \
          -H "apikey: ${{ secrets.SUPABASE_ANON_KEY }}" \
          -H "Authorization: Bearer ${{ secrets.SUPABASE_ANON_KEY }}"